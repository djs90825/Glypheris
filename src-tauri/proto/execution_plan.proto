syntax = "proto3";

package glypheris.agents;

message ExecutionPlan {
    enum PriorityLevel {
        BACKGROUND = 0;
        LOW = 1;
        NORMAL = 2;
        HIGH = 3;
        CRITICAL = 4;
    }

    message TaskNode {
        string task_id = 1;
        string tool_name = 2;
        string parameters_json = 3;
        repeated string dependencies = 4;
    }

    string plan_id = 1;
    string objective = 2;
    PriorityLevel priority_level = 3;
    int32 max_retries = 4;
    int32 timeout_ms = 5;
    bool requires_confirmation = 6;
    bool parallel_allowed = 7;
    repeated TaskNode nodes = 8;
    float estimated_cost_units = 9;
    bool compiler_verified = 10;
}
